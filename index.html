<script>
const SQRT3=Math.sqrt(3),HEX=35,P=SQRT3*HEX/2;
let lang='en',diff=1,phase='menu';
const T={
en:{title:'🌍 World Conquest',choose:'Choose Your Country',gold:'Gold',troops:'Troops',territories:'Territories',time:'Time',recruit:'Recruit (1💰=100⚔️)',factory:'Factory (500💰)',fort:'Fortify (300💰/lv)',move:'Move Troops',attack:'Attack',cancel:'Cancel',close:'Close',send:'Send',build:'Build',easy:'Easy',normal:'Normal',hard:'Hard',victory:'Victory Progress',won:'🎉 You conquered the world!',lost:'💀 You have been defeated!',notif_recruit:'Recruited %d troops in %s',notif_factory:'Built factory in %s',notif_fort:'Fortified %s to lv %d',notif_attack_won:'Conquered %s from %s!',notif_attack_lost:'Attack on %s failed!',notif_move:'Moved %d troops to %s',notif_ai_attack:'AI %s attacked your %s!',goldSec:'/s',quality:'Quality',owner:'Owner',neutral:'Neutral',player:'You',amount:'Amount',sec:'s',of:'of'},

function t(k){return T[lang][k]||k}
// Countries definition: name, nameCN, hexes[{q,r,quality}], color
const COUNTRIES=[
{n:'Canada',nc:'加拿大',h:[{q:-8,r:-5,qi:3},{q:-7,r:-5,qi:4},{q:-6,r:-5,qi:3},{q:-8,r:-4,qi:4},{q:-7,r:-4,qi:3},{q:-6,r:-4,qi:5},{q:-9,r:-4,qi:2},{q:-9,r:-5,qi:2}],c:'#e74'},
{n:'USA',nc:'美国',h:[{q:-7,r:-3,qi:5},{q:-6,r:-3,qi:4},{q:-5,r:-4,qi:4},{q:-5,r:-3,qi:5},{q:-4,r:-4,qi:3},{q:-4,r:-3,qi:5},{q:-3,r:-3,qi:4},{q:-6,r:-2,qi:5},{q:-5,r:-2,qi:4},{q:-4,r:-2,qi:3}],c:'#48f'},
{n:'Mexico',nc:'墨西哥',h:[{q:-5,r:-1,qi:3},{q:-4,r:-1,qi:3},{q:-3,r:-2,qi:2},{q:-3,r:-1,qi:3}],c:'#fa4'},
{n:'Colombia',nc:'哥伦比亚',h:[{q:-2,r:-1,qi:3},{q:-1,r:-2,qi:3},{q:-1,r:-1,qi:2},{q:-2,r:0,qi:3}],c:'#4c8'},
{n:'Brazil',nc:'巴西',h:[{q:0,r:-1,qi:4},{q:1,r:-2,qi:4},{q:1,r:-1,qi:5},{q:2,r:-2,qi:3},{q:2,r:-1,qi:4},{q:3,r:-2,qi:3},{q:0,r:0,qi:3},{q:3,r:-1,qi:3}],c:'#2a4'},
{n:'Argentina',nc:'阿根廷',h:[{q:1,r:1,qi:3},{q:2,r:0,qi:3},{q:2,r:1,qi:2},{q:3,r:0,qi:3},{q:3,r:1,qi:2}],c:'#88c'},
{n:'UK',nc:'英国',h:[{q:3,r:-7,qi:4},{q:4,r:-8,qi:5}],c:'#64a'},
{n:'France',nc:'法国',h:[{q:4,r:-6,qi:4},{q:5,r:-7,qi:4},{q:5,r:-6,qi:3}],c:'#44e'},

{n:'Italy',nc:'意大利',h:[{q:6,r:-7,qi:4},{q:6,r:-6,qi:3}],c:'#4a4'},
{n:'Poland',nc:'波兰',h:[{q:6,r:-9,qi:3},{q:7,r:-9,qi:3},{q:7,r:-8,qi:3}],c:'#e44'},
{n:'Algeria',nc:'阿尔及利亚',h:[{q:3,r:-4,qi:2},{q:4,r:-4,qi:3},{q:3,r:-3,qi:2}],c:'#b94'},
{n:'Egypt',nc:'埃及',h:[{q:5,r:-4,qi:3},{q:6,r:-5,qi:4},{q:6,r:-4,qi:3}],c:'#da4'},
{n:'Nigeria',nc:'尼日利亚',h:[{q:4,r:-2,qi:3},{q:5,r:-3,qi:3},{q:5,r:-2,qi:4},{q:4,r:-1,qi:3}],c:'#4a8'},
{n:'South Africa',nc:'南非',h:[{q:5,r:1,qi:3},{q:6,r:0,qi:4},{q:6,r:1,qi:3},{q:5,r:2,qi:3}],c:'#8a4'},
{n:'Russia',nc:'俄罗斯',h:[{q:7,r:-10,qi:3},{q:8,r:-10,qi:3},{q:8,r:-9,qi:4},{q:9,r:-10,qi:3},{q:9,r:-9,qi:4},{q:10,r:-10,qi:3},{q:7,r:-7,qi:4},{q:8,r:-7,qi:3},{q:9,r:-8,qi:5},{q:8,r:-8,qi:4}],c:'#a44'},
{n:'Turkey',nc:'土耳其',h:[{q:7,r:-6,qi:3},{q:8,r:-6,qi:4},{q:7,r:-5,qi:3}],c:'#e88'},
{n:'Saudi Arabia',nc:'沙特阿拉伯',h:[{q:7,r:-4,qi:3},{q:8,r:-4,qi:4},{q:7,r:-3,qi:3}],c:'#8c4'},
{n:'India',nc:'印度',h:[{q:9,r:-5,qi:4},{q:10,r:-6,qi:5},{q:10,r:-5,qi:4},{q:9,r:-4,qi:3},{q:8,r:-3,qi:3}],c:'#e84'},
{n:'China',nc:'中国',h:[{q:10,r:-8,qi:4},{q:11,r:-9,qi:4},{q:11,r:-8,qi:5},{q:12,r:-9,qi:3},{q:12,r:-8,qi:4},{q:10,r:-7,qi:4},{q:11,r:-7,qi:5},{q:9,r:-7,qi:3}],c:'#c22'},
{n:'Japan',nc:'日本',h:[{q:13,r:-9,qi:4},{q:13,r:-8,qi:5},{q:14,r:-9,qi:4}],c:'#f4a'},
{n:'Indonesia',nc:'印度尼西亚',h:[{q:10,r:-3,qi:3},{q:11,r:-4,qi:3},{q:11,r:-3,qi:2}],c:'#a86'},
{n:'Australia',nc:'澳大利亚',h:[{q:11,r:0,qi:4},{q:12,r:-1,qi:4},{q:12,r:0,qi:5},{q:13,r:-1,qi:3},{q:11,r:1,qi:3},{q:12,r:1,qi:4}],c:'#ec8'}
];
const AI_COLORS=['#d44','#d4d','#4dd','#dd4'];
let game=null;
function hexToPixel(q,r){return{x:HEX*(SQRT3*q+SQRT3/2*r),y:HEX*(1.5*r)}}
function pixelToHex(x,y){const q=(SQRT3/3*x-1/3*y)/HEX,r=(2/3*y)/HEX;return cubeRound(q,r)}
function cubeRound(q,r){const s=-q-r,rq=Math.round(q),rr=Math.round(r),rs=Math.round(s);const dq=Math.abs(rq-q),dr=Math.abs(rr-r),ds=Math.abs(rs-s);if(dq>dr&&dq>ds)rq=-rr-rs;else if(dr>ds)rr=-rq-rs;return{q:rq,r:rr}}
function hexDist(a,b){return(Math.abs(a.q-b.q)+Math.abs(a.q+a.r-b.q-b.r)+Math.abs(a.r-b.r))/2}
function getNeighbors(q,r){return[[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]].map(d=>({q:q+d[0],r:r+d[1]}))}
class GameState{
constructor(playerCI,difficulty){
this.diff=difficulty;this.playerCI=playerCI;this.hexes=new Map();this.gold=[0,0,0,0,0];this.time=0;this.running=true;
this.aiTimers=[0,0,0,0];this.selected=null;this.mode='normal';this.moveFrom=null;this.panX=0;this.panY=0;this.zoom=1;
this.totalHexes=COUNTRIES.reduce((s,c)=>s+c.h.length,0);
const aiIds=[0,1,2,3];const pi=playerCI<4?playerCI:0;
this.playerId=0;
// Build hexes
COUNTRIES.forEach((country,ci)=>{
const owner=ci===playerCI?0:-1;// 0=player, -1=neutral initially
country.h.forEach(h=>{
const key=h.q+','+h.r;
this.hexes.set(key,{q:h.q,r:h.r,ci:ci,owner:-1,troops:0,factories:0,fort:0,quality:hi=>h.qi||3});
const hx=this.hexes.get(key);hx.quality=h.qi||3;
if(ci===playerCI){hx.owner=0;hx.troops=200;this.gold[0]=difficulty===0?2000:1000;}
});
});
// Assign AI owners
let aiIdx=1;
COUNTRIES.forEach((country,ci)=>{
if(ci===playerCI)return;
if(aiIdx<=3){
country.h.forEach(h=>{
const hx=this.hexes.get(h.q+','+h.r);
if(hx){hx.owner=aiIdx;hx.troops=150+(Math.random()*100|0);}
});
aiIdx++;
}
});
// Fill remaining AIs
for(let i=aiIdx;i<=3;i++){
const ci=this.getUnassignedCI();
if(ci>=0){
COUNTRIES[ci].h.forEach(h=>{
const hx=this.hexes.get(h.q+','+h.r);
if(hx){hx.owner=i;hx.troops=100+(Math.random()*80|0);}
});
}
}
this.assignAllAI();
}
getUnassignedCI(){for(let i=0;i<COUNTRIES.length;i++){let taken=false;this.hexes.forEach(h=>{if(h.ci===i&&h.owner>=0)taken=true;});if(!taken)return i;}return -1;}
assignAllAI(){
const owned=new Set();this.hexes.forEach(h=>{if(h.owner>0)owned.add(h.owner);});
this.aiCount=owned.size;
}
getPlayerHexes(pid){let r=[];this.hexes.forEach(h=>{if(h.owner===pid)r.push(h);});return r;}
getPlayerTroops(pid){return this.getPlayerHexes(pid).reduce((s,h)=>s+h.troops,0);}
getIncome(pid){return this.getPlayerHexes(pid).reduce((s,h)=>s+h.quality+ h.factories*5,0);}
getOwnerName(owner){if(owner===0)return t('player');if(owner<0)return t('neutral');return COUNTRIES[this.getAnyCI(owner)]?.nc||'AI '+owner;}
getAnyCI(owner){for(const[,h]of this.hexes)if(h.owner===owner)return h.ci;return -1;}
getColor(owner){if(owner===0)return COUNTRIES[this.playerCI]?.c||'#4f4';if(owner<0)return'#333';const ci=this.getAnyCI(owner);if(ci>=0)return COUNTRIES[ci]?.c||AI_COLORS[owner];return AI_COLORS[owner]||'#888';}
hexKey(q,r){return q+','+r;}
getHex(q,r){return this.hexes.get(this.hexKey(q,r));}
tick(dt){
if(!this.running)return;
this.time+=dt;
// Gold income
for(let i=0;i<=3;i++)this.gold[i]+=this.getIncome(i)*dt;
// AI
const aiMult=[1,1,1,1];
if(this.diff===0){aiMult[1]=0.5;aiMult[2]=0.5;aiMult[3]=0.5;}
if(this.diff===2){aiMult[1]=1.5;aiMult[2]=1.5;aiMult[3]=1.5;}
for(let i=1;i<=3;i++){
this.aiTimers[i]+=dt*aiMult[i];
if(this.aiTimers[i]>=2){this.aiTimers[i]=0;this.aiTick(i);}
}
// Check victory
const ph=this.getPlayerHexes(0).length;
const pct=ph/this.totalHexes;
document.querySelector('#victoryBar .fill').style.width=(pct*100)+'%';
document.querySelector('#victoryBar span').textContent=t('victory')+': '+Math.round(pct*100)+'%';
if(pct>=0.5){this.running=false;notify(t('won'));}
if(ph===0){this.running=false;notify(t('lost'));}
}
aiTick(ai){
const hexes=this.getPlayerHexes(ai);
if(!hexes.length)return;
const gold=this.gold[ai];
// Recruit
if(gold>100){
const h=hexes[Math.random()*hexes.length|0];
const amt=Math.min(Math.floor(gold)*100,5000);
h.troops+=amt;this.gold[ai]-=amt/100;
}
// Build factory
if(gold>500){
const h=hexes.find(x=>x.factories<3);
if(h){h.factories++;this.gold[ai]-=500;}
}
// Build fort
if(gold>400){
const h=hexes.find(x=>x.fort<5);
if(h){h.fort++;this.gold[ai]-=300;}
}
// Attack
const attackers=hexes.filter(h=>h.troops>300);
if(attackers.length){
const src=attackers[Math.random()*attackers.length|0];
const nbrs=getNeighbors(src.q,src.r);
const targets=nbrs.map(n=>this.getHex(n.q,n.r)).filter(h=>h&&h.owner!==ai);
if(targets.length){
const tgt=targets[Math.random()*targets.length|0];
this.doCombat(src,tgt,Math.floor(src.troops*0.6),ai);
}
}
}
doCombat(src,tgt,troops,attackerId){
const defPower=1.2+tgt.fort*0.2;
const atkRand=0.85+Math.random()*0.3;
const defRand=0.85+Math.random()*0.3;
const atkStr=troops*1.0*atkRand;
const defStr=tgt.troops*defPower*defRand;
if(atkStr>defStr){
const survived=Math.max(1,Math.floor(troops*(0.5+Math.random()*0.3)));
tgt.owner=src.owner;tgt.troops=survived;src.troops-=troops;
if(src.owner===0)notify(t('notif_attack_won').replace('%s',COUNTRIES[tgt.ci]?.nc||'?').replace('%s','AI'));
if(tgt.owner===0&&attackerId>0)notify(t('notif_ai_attack').replace('%s',''+attackerId).replace('%s',COUNTRIES[tgt.ci]?.nc||'?'));
return true;
}else{
src.troops-=troops;
if(src.owner===0)notify(t('notif_attack_lost').replace('%s',COUNTRIES[tgt.ci]?.nc||'?'));
return false;
}
}
}
// Rendering
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
function drawHex(cx,cy,size,fill,stroke,linewidth){
ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);ctx.lineTo(cx+size*Math.cos(a),cy+size*Math.sin(a));}ctx.closePath();
if(fill){ctx.fillStyle=fill;ctx.fill();}
if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=linewidth||1;ctx.stroke();}
}
let hoverHex=null;
function render(){
if(!game||!game.running){requestAnimationFrame(render);return;}
ctx.clearRect(0,0,W,H);
// Background
ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
const ox=W/2+game.panX,oy=H/2+game.panY,z=game.zoom;
ctx.save();ctx.translate(ox,oy);ctx.scale(z,z);
// Draw hexes
game.hexes.forEach((h)=>{
const p=hexToPixel(h.q,h.r);
const fill=game.getColor(h.owner);
const isHover=hoverHex&&hoverHex.q===h.q&&hoverHex.r===h.r;
const isSel=game.selected&&game.selected.q===h.q&&game.selected.r===h.r;
let border=null;
// Country border
const nbrs=getNeighbors(h.q,h.r);
for(const n of nbrs){const nh=game.getHex(n.q,n.r);if(!nh||nh.ci!==h.ci){border='#556';break;}}
drawHex(p.x,p.y,HEX-1,fill,border||'rgba(255,255,255,0.08)',border?2:1);
if(isHover)drawHex(p.x,p.y,HEX-1,'rgba(255,255,255,0.15)');
if(isSel)drawHex(p.x,p.y,HEX-2,null,'#fff',2);
// Troops
if(h.troops>0){ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText(h.troops>9999?'9999+':h.troops,p.x,p.y+4);}
// Icons
let icons='';if(h.factories)icons+='🏭'.repeat(Math.min(h.factories,3));
if(h.fort)icons+='🛡';
if(icons){ctx.font='9px sans-serif';ctx.fillText(icons,p.x,p.y-HEX+10);}
// Quality stars
ctx.fillStyle='rgba(255,255,200,0.5)';ctx.font='7px sans-serif';
ctx.fillText('★'.repeat(h.quality),p.x,p.y+HEX-6);
});
// Attack/move highlights
if(game.mode==='attack'&&game.selected){
const nbrs=getNeighbors(game.selected.q,game.selected.r);
for(const n of nbrs){const nh=game.getHex(n.q,n.r);if(nh&&nh.owner!==0){
const p=hexToPixel(n.q,n.r);drawHex(p.x,p.y,HEX-1,'rgba(255,0,0,0.2)','#f44',2);
}}
}
if(game.mode==='move'&&game.selected){
game.hexes.forEach(h2=>{if(h2.owner===0&&(h2.q!==game.selected.q||h2.r!==game.selected.r)){
const p=hexToPixel(h2.q,h2.r);drawHex(p.x,p.y,HEX-1,'rgba(0,200,255,0.15)','#0cf',2);
}});
}
ctx.restore();
requestAnimationFrame(render);
}
requestAnimationFrame(render);
// UI update
setInterval(()=>{
if(!game)return;
document.getElementById('hGold').textContent='💰 '+Math.floor(game.gold[0])+' (+'+game.getIncome(0)+t('goldSec')+')';
document.getElementById('hTroops').textContent='⚔️ '+game.getPlayerTroops(0);
document.getElementById('hHex').textContent='🗺️ '+game.getPlayerHexes(0).length+t('of')+game.totalHexes;
const m=Math.floor(game.time/60),s=Math.floor(game.time%60);
document.getElementById('hTime').textContent='⏱️ '+m+':'+(s<10?'0':'')+s;
document.getElementById('hLang').textContent='🌐 '+(lang==='en'?'EN':'中文');
updateSidebar();
if(game.running)game.tick(0.1);
},100);
function updateSidebar(){
const sb=document.getElementById('sidebar');
if(!game||!game.selected){sb.style.display='none';return;}
sb.style.display='block';
const h=game.selected;const co=COUNTRIES[h.ci];
const isOwn=h.owner===0;
let html=`<h3>${lang==='cn'?co.nc:co.n}</h3>`;
html+=`<div>${t('owner')}: ${game.getOwnerName(h.owner)}</div>`;
html+=`<div>${t('quality')}: ${'★'.repeat(h.quality)}</div>`;
html+=`<div>⚔️ ${h.troops}</div>`;
html+=`<div>🏭 ${h.factories}/3 | 🛡 Lv${h.fort}</div>`;
if(isOwn){
html+=`<button class="btn btn-recruit" onclick="doRecruit()">${t('recruit')}</button>`;
if(h.factories<3)html+=`<button class="btn btn-factory" onclick="doFactory()">${t('factory')}</button>`;
if(h.fort<5)html+=`<button class="btn btn-fort" onclick="doFort()">${t('fort')}</button>`;
html+=`<button class="btn btn-move" onclick="doMoveMode()">${t('move')}</button>`;
html+=`<button class="btn btn-attack" onclick="doAttackMode()">${t('attack')}</button>`;
}
if(game.mode!=='normal')html+=`<button class="btn btn-cancel" onclick="cancelMode()">${t('cancel')}</button>`;
sb.innerHTML=html;
}
// Input
let drag=false,dragX,dragY;
canvas.addEventListener('mousedown',e=>{drag=true;dragX=e.clientX;dragY=e.clientY;});
canvas.addEventListener('mousemove',e=>{
if(!game)return;
const rect=canvas.getBoundingClientRect();
const mx=(e.clientX-rect.left-W/2-game.panX)/game.zoom;
const my=(e.clientY-rect.top-H/2-game.panY)/game.zoom;
const hex=pixelToHex(mx,my);
hoverHex=game.getHex(hex.q,hex.r);
// Tooltip
const tip=document.getElementById('tooltip');
if(hoverHex){
const co=COUNTRIES[hoverHex.ci];
tip.style.display='block';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY+12)+'px';
tip.innerHTML=`<b>${lang==='cn'?co.nc:co.n}</b><br>${t('owner')}: ${game.getOwnerName(hoverHex.owner)}<br>⚔️ ${hoverHex.troops} | ${'★'.repeat(hoverHex.quality)}`;
}else tip.style.display='none';
if(drag){
game.panX+=e.clientX-dragX;game.panY+=e.clientY-dragY;
dragX=e.clientX;dragY=e.clientY;
}
});
canvas.addEventListener('mouseup',e=>{
if(drag&&Math.abs(e.clientX-dragX)<5&&Math.abs(e.clientY-dragY)<5)handleClick(e);
drag=false;
});
canvas.addEventListener('wheel',e=>{
if(!game)return;e.preventDefault();
game.zoom=Math.max(0.3,Math.min(3,game.zoom*(e.deltaY<0?1.1:0.9)));
},{passive:false});
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;dragX=e.touches[0].clientX;dragY=e.touches[0].clientY;}},{passive:true});
canvas.addEventListener('touchmove',e=>{
if(!game||!drag)return;
if(e.touches.length===1){
game.panX+=e.touches[0].clientX-dragX;game.panY+=e.touches[0].clientY-dragY;
dragX=e.touches[0].clientX;dragY=e.touches[0].clientY;}
},{passive:true});
canvas.addEventListener('touchend',e=>{
if(drag&&e.changedTouches.length){
const t2=e.changedTouches[0];
if(Math.abs(t2.clientX-dragX)<10&&Math.abs(t2.clientY-dragY)<10){
const rect=canvas.getBoundingClientRect();
const mx=(t2.clientX-rect.left-W/2-game.panX)/game.zoom;
const my=(t2.clientY-rect.top-H/2-game.panY)/game.zoom;
const hex=pixelToHex(mx,my);
const h=game.getHex(hex.q,hex.r);
if(h)selectHex(h);
}
}drag=false;
},{passive:true});
function handleClick(e){
if(!game)return;
const rect=canvas.getBoundingClientRect();
const mx=(e.clientX-rect.left-W/2-game.panX)/game.zoom;
const my=(e.clientY-rect.top-H/2-game.panY)/game.zoom;
const hex=pixelToHex(mx,my);
const h=game.getHex(hex.q,hex.r);
if(!h)return;
selectHex(h);
}
function selectHex(h){
if(game.mode==='attack'){
const nbrs=getNeighbors(game.selected.q,game.selected.r);
const isAdj=nbrs.some(n=>n.q===h.q&&n.r===h.r);
if(isAdj&&h.owner!==0){
showAttackModal(game.selected,h);return;
}
game.mode='normal';
}
if(game.mode==='move'&&h.owner===0&&(h.q!==game.selected.q||h.r!==game.selected.r)){
showMoveModal(game.selected,h);return;
}
game.selected=h;game.mode='normal';updateSidebar();
}
function showAttackModal(src,tgt){
const modal=document.getElementById('actionModal');
const maxT=src.troops-1;let sendT=Math.floor(maxT*0.7);
modal.innerHTML=`<h3>${t('attack')}</h3>
<div style="margin:8px 0">${COUNTRIES[tgt.ci]?.nc||'?'} (⚔️${tgt.troops} 🛡Lv${tgt.fort})</div>
<div>${t('troops')}: <span id="atkAmt">${sendT}</span></div>
<input type="range" min="10" max="${maxT}" value="${sendT}" oninput="document.getElementById('atkAmt').textContent=this.value">
<div class="modal-btns">
<button class="btn btn-attack" onclick="execAttack(${src.q},${src.r},${tgt.q},${tgt.r})">${t('attack')}!</button>
<button class="btn btn-cancel" onclick="cancelMode()">${t('cancel')}</button>
</div>`;
modal.style.display='block';
}
function showMoveModal(src,tgt){
const modal=document.getElementById('actionModal');
const maxT=src.troops-1;let sendT=Math.floor(maxT*0.7);
modal.innerHTML=`<h3>${t('move')}</h3>
<div style="margin:8px 0">→ ${COUNTRIES[tgt.ci]?.nc||'?'}</div>
<div>${t('amount')}: <span id="mvAmt">${sendT}</span></div>
<input type="range" min="1" max="${maxT}" value="${sendT}" oninput="document.getElementById('mvAmt').textContent=this.value">
<div class="modal-btns">
<button class="btn btn-move" onclick="execMove(${src.q},${src.r},${tgt.q},${tgt.r})">${t('send')}</button>
<button class="btn btn-cancel" onclick="cancelMode()">${t('cancel')}</button>
</div>`;
modal.style.display='block';
}
window.execAttack=function(sq,sr,tq,tr){
const src=game.getHex(sq,sr),tgt=game.getHex(tq,tr);
if(!src||!tgt)return;
const amt=parseInt(document.getElementById('atkAmt')?.textContent||src.troops-1);
game.doCombat(src,tgt,amt,src.owner);
game.mode='normal';game.selected=tgt;
document.getElementById('actionModal').style.display='none';
updateSidebar();
};
window.execMove=function(sq,sr,tq,tr){
const src=game.getHex(sq,sr),tgt=game.getHex(tq,tr);
if(!src||!tgt)return;
const amt=parseInt(document.getElementById('mvAmt')?.textContent||src.troops-1);
const real=Math.min(amt,src.troops-1);
tgt.troops+=real;src.troops-=real;
notify(t('notif_move').replace('%d',real).replace('%s',COUNTRIES[tgt.ci]?.nc||'?'));
game.mode='normal';game.selected=tgt;
document.getElementById('actionModal').style.display='none';
updateSidebar();
};
window.doRecruit=function(){
if(!game.selected||game.selected.owner!==0)return;
const amt=Math.floor(game.gold[0])*100;
if(amt<=0)return;
game.selected.troops+=amt;game.gold[0]-=amt/100;
notify(t('notif_recruit').replace('%d',amt).replace('%s',COUNTRIES[game.selected.ci]?.nc||'?'));
updateSidebar();
};
window.doFactory=function(){
if(!game.selected||game.selected.owner!==0||game.selected.factories>=3||game.gold[0]<500)return;
game.selected.factories++;game.gold[0]-=500;
notify(t('notif_factory').replace('%s',COUNTRIES[game.selected.ci]?.nc||'?'));
updateSidebar();
};
window.doFort=function(){
if(!game.selected||game.selected.owner!==0||game.selected.fort>=5||game.gold[0]<300)return;
game.selected.fort++;game.gold[0]-=300;
notify(t('notif_fort').replace('%s',COUNTRIES[game.selected.ci]?.nc||'?').replace('%d',game.selected.fort));
updateSidebar();
};
window.doAttackMode=function(){if(!game.selected)return;game.mode='attack';updateSidebar();};
window.doMoveMode=function(){if(!game.selected)return;game.mode='move';updateSidebar();};
window.cancelMode=function(){game.mode='normal';document.getElementById('actionModal').style.display='none';updateSidebar();};
function notify(msg){
const div=document.createElement('div');div.className='notif glass';div.textContent=msg;
document.getElementById('notifs').appendChild(div);
setTimeout(()=>div.remove(),3000);
}
// Menu
window.setLang=function(l){lang=l;document.getElementById('menuTitle').textContent=t('title');
document.getElementById('menuLang').style.display='none';document.getElementById('menuDiff').style.display='block';};
window.setDiff=function(d){diff=d;document.getElementById('menu').style.display='none';showCountryPicker();};
function showCountryPicker(){
const cp=document.getElementById('countryPicker');cp.style.display='flex';
document.getElementById('cpTitle').textContent=t('choose');
const grid=document.getElementById('countryGrid');grid.innerHTML='';
COUNTRIES.forEach((co,i)=>{
const card=document.createElement('div');card.className='ccard glass';
card.innerHTML=`<div style="font-weight:bold">${lang==='cn'?co.nc:co.n}</div><div class="stars">${'★'.repeat(Math.round(co.h.reduce((s,h)=>s+h.qi,0)/co.h.length))}</div><div style="font-size:11px;color:#aaa">${co.h.length} hexes</div>`;
card.style.background=`linear-gradient(135deg,${co.c}44,${co.c}22)`;
card.onclick=()=>startGame(i);
grid.appendChild(card);
});
}
function startGame(ci){
document.getElementById('countryPicker').style.display='none';
document.getElementById('topBar').style.display='flex';
document.getElementById('victoryBar').style.display='flex';
game=new GameState(ci,diff);
}
document.getElementById('hLang').addEventListener('click',()=>{
lang=lang==='en'?'cn':'en';updateSidebar();
});
// Save/Load
function saveGame(){if(!game)return;try{localStorage.setItem('wc_save',JSON.stringify({lang,diff,ci:game.playerCI,time:game.time,hexes:Array.from(game.hexes.entries()),gold:game.gold}));}catch(e){}}
function loadGame(){try{const d=JSON.parse(localStorage.getItem('wc_save'));if(d){lang=d.lang;diff=d.diff;game=new GameState(d.ci,d.diff);game.time=d.time;game.gold=d.gold;d.hexes.forEach(([k,v])=>{const h=game.hexes.get(k);if(h){h.owner=v.owner;h.troops=v.troops;h.factories=v.factories;h.fort=v.fort;}});document.getElementById('menu').style.display='none';document.getElementById('topBar').style.display='flex';document.getElementById('victoryBar').style.display='flex';}}catch(e){}}
setInterval(saveGame,30000);
// Auto-load on start
const saved=localStorage.getItem('wc_save');
if(saved){/* loadGame(); // uncomment to enable autoload */}
</script></body></html>

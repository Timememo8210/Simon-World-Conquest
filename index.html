*{margin:0;padding:0;box-sizing:border-box}
body{background:#2a2a3e;color:#eee;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none}
canvas{display:block;cursor:grab}
canvas:active{cursor:grabbing}
#titleScreen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a3e,#3a3580,#2e2e4e);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
#titleScreen h1{font-size:3em;margin-bottom:.3em;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#titleScreen .sub{color:#aaa;margin-bottom:2em;font-size:1.1em}
.menu-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:14px 40px;margin:8px;font-size:1.1em;border-radius:12px;cursor:pointer;transition:all .2s;min-width:220px}
.menu-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(102,126,234,.4)}
.menu-btn:disabled{opacity:.4;cursor:default;transform:none}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.setup-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a3e,#3a3580,#2e2e4e);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:20px}
.setup-screen h2{margin-bottom:20px;font-size:1.8em;color:#ffd200}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;max-width:800px;width:100%;max-height:60vh;overflow-y:auto;padding:10px}
.country-card{padding:12px;border-radius:10px;cursor:pointer;text-align:center;transition:all .2s;border:2px solid transparent}
.country-card:hover{transform:scale(1.05);border-color:#ffd200}
.country-card .name{font-weight:bold;font-size:1em}
.country-card .hexes{font-size:.8em;color:#ccc;margin-top:4px}
.country-card.selected{border-color:#ffd200;box-shadow:0 0 20px rgba(255,210,0,.3)}
#topBar{position:fixed;top:0;left:0;right:0;height:44px;background:rgba(15,12,41,.92);display:none;align-items:center;padding:0 16px;gap:16px;z-index:100;font-size:.9em;border-bottom:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px)}
#topBar .stat{display:flex;align-items:center;gap:4px;white-space:nowrap}
#topBar .sep{color:#444}
#sidebar{position:fixed;top:44px;right:0;width:280px;bottom:0;background:rgba(15,12,41,.95);border-left:1px solid rgba(255,255,255,.1);z-index:100;overflow-y:auto;padding:14px;backdrop-filter:blur(8px);transition:transform .3s;display:none}
#sidebar.hidden{transform:translateX(280px)}
#sidebar h3{margin:8px 0 6px;color:#ffd200;font-size:.95em}
#sidebar .info-row{display:flex;justify-content:space-between;padding:3px 0;font-size:.85em;color:#ccc}
.action-btn{width:100%;padding:10px;margin:4px 0;border:none;border-radius:8px;cursor:pointer;font-size:.9em;color:#fff;transition:all .15s}
.action-btn:hover{opacity:.85;transform:translateY(-1px)}
.action-btn:disabled{opacity:.3;cursor:default;transform:none}
.btn-recruit{background:linear-gradient(135deg,#43a047,#2e7d32)}
.btn-factory{background:linear-gradient(135deg,#fb8c00,#e65100)}
.btn-fort{background:linear-gradient(135deg,#1e88e5,#0d47a1)}
.btn-move{background:linear-gradient(135deg,#8e24aa,#4a148c)}
.btn-attack{background:linear-gradient(135deg,#e53935,#b71c1c)}
.btn-navy{background:linear-gradient(135deg,#0277bd,#01579b)}
.btn-cancel{background:#555}
.diff-easy{color:#4CAF50;font-size:.75em}
.diff-medium{color:#FFC107;font-size:.75em}
.diff-hard{color:#F44336;font-size:.75em}
.island-badge{color:#4FC3F7;font-size:.75em}
.slider-row{display:flex;align-items:center;gap:8px;margin:6px 0}
.slider-row input[type=range]{flex:1;accent-color:#ffd200}
.slider-row .val{min-width:50px;text-align:right;font-size:.9em}
#victoryBar{position:fixed;bottom:0;left:0;right:0;height:28px;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;padding:0 12px;font-size:.8em;gap:8px}
#victoryBar .bar{flex:1;height:10px;background:#333;border-radius:5px;overflow:hidden}
#victoryBar .fill{height:100%;background:linear-gradient(90deg,#43a047,#ffd200);border-radius:5px;transition:width .3s}
#notifications{position:fixed;bottom:36px;left:12px;z-index:200;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.notif{padding:8px 14px;border-radius:8px;font-size:.82em;animation:notifIn .3s ease;max-width:300px;color:#fff}
.notif.win{background:rgba(67,160,71,.85)}
.notif.lose{background:rgba(229,57,53,.85)}
.notif.info{background:rgba(30,136,229,.85)}
@keyframes notifIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
#tooltip{position:fixed;background:rgba(0,0,0,.88);color:#fff;padding:6px 12px;border-radius:6px;font-size:.8em;pointer-events:none;z-index:300;display:none;white-space:nowrap}
#menuToggle{display:none;position:fixed;top:48px;right:8px;z-index:150;background:rgba(15,12,41,.9);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:1.1em}
@media(max-width:700px){#sidebar{width:100%}#sidebar.hidden{transform:translateY(100%)}#menuToggle{display:block}}

.lang-btn:hover{border-color:#ffd200}

// ===== HEX MATH (pointy-top) =====
function hexToPixel(c, r) {
  var w = Math.sqrt(3) * HEX_SIZE;
  return { x: c * w + (r % 2) * w * 0.5, y: r * HEX_SIZE * 1.5 };
}

function pixelToHex(px, py) {
  var row = Math.round(py / (HEX_SIZE * 1.5));
  var w = Math.sqrt(3) * HEX_SIZE;
  var col = Math.round((px - (row % 2) * w * 0.5) / w);
  return { col: col, row: row };
}

function getNeighbors(c, r) {
  if (r % 2 === 0) {
    return [[c-1,r-1],[c,r-1],[c-1,r],[c+1,r],[c-1,r+1],[c,r+1]];
  } else {
    return [[c,r-1],[c+1,r-1],[c-1,r],[c+1,r],[c,r+1],[c+1,r+1]];
  }
}

function hexKey(c, r) { return c + ',' + r; }

function formatNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

// ===== INIT MAP =====
function initMapData() {
  var hexes = {};
  var countryHexes = {};
  var totalLand = 0;
  for (var r = 0; r < MAP_DATA.length; r++) {
    var row = MAP_DATA[r];
    for (var c = 0; c < row.length; c++) {
      var ch = row[c];
      if (ch === '.') continue;
      totalLand++;
      var def = COUNTRY_DEFS[ch];
      hexes[hexKey(c, r)] = {
        col: c, row: r, owner: ch, origOwner: ch,
        troops: 0, factories: 0, forts: 0,
        quality: def ? def.q : 1
      };
      if (!countryHexes[ch]) countryHexes[ch] = [];
      countryHexes[ch].push(hexKey(c, r));
    }
  }
  return { hexes: hexes, countryHexes: countryHexes, totalLand: totalLand };
}

function setDiff(d) {

  document.getElementById('diffScreen').style.display = 'none';
  document.getElementById('countryScreen').style.display = 'flex';

function buildCountryGrid() {
  var grid = document.getElementById('countryGrid');
  grid.innerHTML = '';
  var info = initMapData();
  var keys = Object.keys(COUNTRY_DEFS);

  // Detect island countries (no land neighbor to another country)
  var isIsland = {};
  for (var ci = 0; ci < keys.length; ci++) {
    var code = keys[ci];
    var hexList = info.countryHexes[code];
    if (!hexList) continue;
    var hasLandNeighbor = false;
    for (var hi = 0; hi < hexList.length; hi++) {
      var parts = hexList[hi].split(',');
      var hc = parseInt(parts[0]), hr = parseInt(parts[1]);
      var nb = getNeighbors(hc, hr);
      for (var ni = 0; ni < nb.length; ni++) {
        var nk = hexKey(nb[ni][0], nb[ni][1]);
        var nh = info.hexes[nk];
        if (nh && nh.origOwner !== code) { hasLandNeighbor = true; break; }
      }
      if (hasLandNeighbor) break;
    }
    isIsland[code] = !hasLandNeighbor;
  }

  for (var i = 0; i < keys.length; i++) {
    var code = keys[i];
    var def = COUNTRY_DEFS[code];
    if (!info.countryHexes[code]) continue;
    var hexCount = info.countryHexes[code].length;
    var card = document.createElement('div');
    card.className = 'country-card';
    card.style.background = def.color + '33';
    card.style.borderColor = def.color;
    var name = lang === 'cn' ? def.zh : def.en;
    var stars = '';
    for (var si = 0; si < def.q; si++) stars += '\u2B50';
    var islandHTML = isIsland[code] ? '<div class="island-badge">' + t('islandBadge') + '</div>' : '';
    // Difficulty rating
    var diffLabel, diffClass;
    if (isIsland[code] || hexCount < 5) {
      diffLabel = t('diffHard'); diffClass = 'diff-hard';
    } else if (hexCount >= 15 && !isIsland[code]) {
      diffLabel = t('diffEasy'); diffClass = 'diff-easy';
    } else {
      diffLabel = t('diffMedium'); diffClass = 'diff-medium';
    }
    card.innerHTML = '<div class="name">' + name + '</div>' +
      '<div class="hexes">' + hexCount + ' ' + t('hexes') + ' ' + stars + '</div>' +
      '<div class="' + diffClass + '">' + diffLabel + '</div>' +
      islandHTML;
    card.setAttribute('data-code', code);
    card.onclick = function() {
      var cards = document.querySelectorAll('.country-card');
      for (var j = 0; j < cards.length; j++) cards[j].classList.remove('selected');
      this.classList.add('selected');
      playerCountry = this.getAttribute('data-code');
      document.getElementById('startBtn').disabled = false;
    };
    grid.appendChild(card);
  }
}

function startGame() {
  document.getElementById('countryScreen').style.display = 'none';
  initGame();
}

// ===== INIT GAME =====
function initGame() {
  var info = initMapData();
  var hexes = info.hexes;
  var countryHexes = info.countryHexes;
  var totalLand = info.totalLand;

  var startGold = diff === 'easy' ? 2000 : (diff === 'hard' ? 500 : 1000);

  // Shuffle and assign AI countries
  var allCodes = Object.keys(countryHexes);
  var aiCodes = [];
  for (var i = 0; i < allCodes.length; i++) {
    if (allCodes[i] !== playerCountry) aiCodes.push(allCodes[i]);
  }
  // Fisher-Yates shuffle
  for (var i = aiCodes.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = aiCodes[i]; aiCodes[i] = aiCodes[j]; aiCodes[j] = tmp;
  }

  var aiPlayers = [
    { id: 'ai1', color: AI_COLORS[0], name: AI_NAMES[lang][0], countries: [], gold: startGold, _income: 0, _troops: 0, _hexes: 0 },
    { id: 'ai2', color: AI_COLORS[1], name: AI_NAMES[lang][1], countries: [], gold: startGold, _income: 0, _troops: 0, _hexes: 0 },
    { id: 'ai3', color: AI_COLORS[2], name: AI_NAMES[lang][2], countries: [], gold: startGold, _income: 0, _troops: 0, _hexes: 0 }
  ];

  for (var i = 0; i < aiCodes.length; i++) {
    aiPlayers[i % 3].countries.push(aiCodes[i]);
  }

  // Set starting troops
  function setTroops(owner) {
    for (var key in hexes) {
      if (hexes[key].owner === owner) hexes[key].troops = 50000;
    }
  }
  // Set player hexes owner to 'player'
  var pHexList = countryHexes[playerCountry];
  if (pHexList) {
    for (var pi = 0; pi < pHexList.length; pi++) {
      hexes[pHexList[pi]].owner = 'player';
      hexes[pHexList[pi]].troops = 50000;
    }
  }
  for (var a = 0; a < aiPlayers.length; a++) {
    for (var ci = 0; ci < aiPlayers[a].countries.length; ci++) {
      var code = aiPlayers[a].countries[ci];
      var hexList = countryHexes[code];
      if (!hexList) continue;
      for (var hi = 0; hi < hexList.length; hi++) {
        hexes[hexList[hi]].owner = aiPlayers[a].id;
        hexes[hexList[hi]].troops = 50000;
      }
    }
  }

  G = {
    hexes: hexes,
    countryHexes: countryHexes,
    totalLand: totalLand,
    playerCountry: playerCountry,
    playerGold: startGold,
    aiPlayers: aiPlayers,
    gameTime: 0,
    eliminated: {},
    _pIncome: 0, _pTroops: 0, _pHexes: 0
  };

  // Center camera on player
  var pHexes = countryHexes[playerCountry];
  if (pHexes && pHexes.length > 0) {
    var midHex = hexes[pHexes[Math.floor(pHexes.length / 2)]];
    var px = hexToPixel(midHex.col, midHex.row);
    camX = canvas.width / 2 - px.x * zoom;
    camY = canvas.height / 2 - px.y * zoom;
  }

  gameStarted = true;
  showGameUI();
  lastFrameTime = 0;
  requestAnimationFrame(gameLoop);
}

function showGameUI() {
  document.getElementById('topBar').style.display = 'flex';
  document.getElementById('sidebar').style.display = 'block';
  document.getElementById('victoryBar').style.display = 'flex';
  if (window.innerWidth <= 700) {
    document.getElementById('menuToggle').style.display = 'block';
  }
}

function toggleLang() {
  lang = (lang === 'en') ? 'cn' : 'en';
  // Update AI names
  if (G) {
    for (var i = 0; i < G.aiPlayers.length; i++) {
      G.aiPlayers[i].name = AI_NAMES[lang][i];
    }
  }
  updateSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
}

// ===== GAME LOOP =====
function gameLoop(ts) {
  if (!gameStarted || !G) return;
  var dt = lastFrameTime ? Math.min((ts - lastFrameTime) / 1000, 0.1) : 0;
  lastFrameTime = ts;
  gameTime += dt;
  G.gameTime = gameTime;

  economyTick(dt);

  aiTimer += dt;
  var aiInterval = diff === 'easy' ? 7 : (diff === 'hard' ? 1.5 : 4);
  if (aiTimer >= aiInterval) {
    aiTimer = 0;
    aiTick();
  }

  saveTimer += dt;
  if (saveTimer >= 30) {
    saveTimer = 0;
    saveGame();
  }

  checkVictory();
  render();
  updateTopBar();

  requestAnimationFrame(gameLoop);
}

function economyTick(dt) {
  // Player income
  var pIncome = 0, pTroops = 0, pHexes = 0;
  for (var key in G.hexes) {
    var h = G.hexes[key];
    if (h.owner === 'player') {
      pIncome += (h.quality * 1 + h.factories * 3) * dt;
      pTroops += h.troops;
      pHexes++;
    }
  }
  G.playerGold += pIncome;
  G._pIncome = dt > 0 ? pIncome / dt : 0;
  G._pTroops = pTroops;
  G._pHexes = pHexes;

  // AI income
  for (var a = 0; a < G.aiPlayers.length; a++) {
    var ai = G.aiPlayers[a];
    if (G.eliminated[ai.id]) { ai._income=0; ai._troops=0; ai._hexes=0; continue; }
    var income = 0, troops = 0, hcount = 0;
    for (var key in G.hexes) {
      var h = G.hexes[key];
      if (h.owner === ai.id) {
        income += (h.quality * 1 + h.factories * 3) * dt;
        troops += h.troops;
        hcount++;
      }
    }
    ai.gold += income;
    ai._income = dt > 0 ? income / dt : 0;
    ai._troops = troops;
    ai._hexes = hcount;
  }
}

function getOwnerHexCount(ownerId) {
  var count = 0;
  for (var key in G.hexes) {
    if (G.hexes[key].owner === ownerId) count++;
  }
  return count;
}

function getOwnerColor(owner) {
  if (owner === 'player') return COUNTRY_DEFS[playerCountry] ? COUNTRY_DEFS[playerCountry].color : '#fff';
  for (var i = 0; i < G.aiPlayers.length; i++) {
    if (G.aiPlayers[i].id === owner) return G.aiPlayers[i].color;
  }
  if (COUNTRY_DEFS[owner]) return COUNTRY_DEFS[owner].color;
  return '#666';
}

function getOwnerName(owner) {
  if (owner === 'player') return t('you');
  for (var i = 0; i < G.aiPlayers.length; i++) {
    if (G.aiPlayers[i].id === owner) return G.aiPlayers[i].name;
  }
  if (COUNTRY_DEFS[owner]) {
    return lang === 'cn' ? COUNTRY_DEFS[owner].zh : COUNTRY_DEFS[owner].en;
  }
  return owner;
}

// ===== COMBAT =====
function doCombat(attacker, defender, sendTroops, attackerOwner, navyMult) {
  var mult = navyMult || 1;
  var atkPower = sendTroops * mult * (1 + (Math.random() * 0.3 - 0.15));
  var defPower = defender.troops * (1.2 + defender.forts * 0.2) * (1 + (Math.random() * 0.3 - 0.15));

  attacker.troops -= sendTroops;

  var atkName = getOwnerName(attackerOwner);
  var defName = getOwnerName(defender.owner);

  if (atkPower > defPower) {
    var remaining = Math.floor(atkPower - defPower);
    var prevOwner = defender.owner;
    defender.owner = attackerOwner;
    defender.troops = Math.max(1, remaining);
    defender.forts = Math.max(0, defender.forts - 1);
    notify(atkName + ' ' + t('captured') + ' ' + defName, attackerOwner === 'player' ? 'win' : 'info');

    // Check elimination
    if (prevOwner !== 'player') {
      if (getOwnerHexCount(prevOwner) === 0) {
        G.eliminated[prevOwner] = true;
        notify(defName + ' ' + t('eliminated'), 'win');
      }
    }
  } else {
    var ratio = atkPower / Math.max(1, defPower);
    defender.troops = Math.floor(defender.troops * (1 - ratio * 0.5));
    var atkLost = Math.floor(sendTroops * (0.5 + ratio * 0.3));
    attacker.troops += Math.max(0, sendTroops - atkLost);
    notify(atkName + ' ' + t('lost') + ' ' + defName, attackerOwner === 'player' ? 'lose' : 'info');
  }
}

// ===== AI =====
function aiTick() {
  if (!G) return;
  for (var a = 0; a < G.aiPlayers.length; a++) {
    var ai = G.aiPlayers[a];
    if (G.eliminated[ai.id]) continue;
    if (getOwnerHexCount(ai.id) === 0) {
      G.eliminated[ai.id] = true;
      notify(ai.name + ' ' + t('eliminated'), 'lose');
      continue;
    }
    aiAction(ai);
  }
}

function aiAction(ai) {
  // Gather owned hexes
  var myHexes = [];
  for (var key in G.hexes) {
    if (G.hexes[key].owner === ai.id) myHexes.push(G.hexes[key]);
  }
  if (myHexes.length === 0) return;

  // Recruit on strongest hex
  var strongest = myHexes[0];
  for (var i = 1; i < myHexes.length; i++) {
    if (myHexes[i].troops > strongest.troops) strongest = myHexes[i];
  }
  var recruitAmt = Math.floor(ai.gold);
  if (recruitAmt > 0) {
    strongest.troops += recruitAmt * 100;
    ai.gold -= recruitAmt;
  }

  // Build factory on best quality hex
  if (ai.gold >= 500) {
    var bestQ = null;
    for (var i = 0; i < myHexes.length; i++) {
      if (myHexes[i].factories < 3 && (!bestQ || myHexes[i].quality > bestQ.quality)) {
        bestQ = myHexes[i];
      }
    }
    if (bestQ) {
      bestQ.factories++;
      ai.gold -= 500;
    }
  }

  // Build fort on border hex
  if (ai.gold >= 300) {
    var borderHex = null;
    for (var i = 0; i < myHexes.length; i++) {
      var h = myHexes[i];
      if (h.forts >= 5) continue;
      var nb = getNeighbors(h.col, h.row);
      for (var ni = 0; ni < nb.length; ni++) {
        var nk = hexKey(nb[ni][0], nb[ni][1]);
        if (G.hexes[nk] && G.hexes[nk].owner !== ai.id) {
          borderHex = h;
          break;
        }
      }
      if (borderHex) break;
    }
    if (borderHex) {
      borderHex.forts++;
      ai.gold -= 300;
    }
  }

  // Attack weakest adjacent enemy
  var candidates = [];
  for (var i = 0; i < myHexes.length; i++) {
    var h = myHexes[i];
    if (h.troops < 1000) continue;
    var nb = getNeighbors(h.col, h.row);
    for (var ni = 0; ni < nb.length; ni++) {
      var nk = hexKey(nb[ni][0], nb[ni][1]);
      var target = G.hexes[nk];
      if (!target || target.owner === ai.id) continue;
      candidates.push({ from: h, target: target });
    }
  }
  if (candidates.length > 0) {
    // Sort by weakest target
    candidates.sort(function(a, b) { return a.target.troops - b.target.troops; });
    var best = candidates[0];
    var send = Math.floor(best.from.troops * 0.6);
    if (send > 0) doCombat(best.from, best.target, send, ai.id);
  }

  // Navy attack: 10% chance to attack a non-adjacent enemy hex
  if (Math.random() < 0.10 && myHexes.length > 0) {
    var strongNavy = myHexes[0];
    for (var i = 1; i < myHexes.length; i++) {
      if (myHexes[i].troops > strongNavy.troops) strongNavy = myHexes[i];
    }
    if (strongNavy.troops > 2000) {
      // Find a non-adjacent enemy hex
      var navyTargets = [];
      for (var key in G.hexes) {
        var th = G.hexes[key];
        if (th.owner !== ai.id && th.owner !== 'player') continue; // only attack player or other AI
        if (th.owner === ai.id) continue;
        // Check it's not adjacent
        var nb = getNeighbors(strongNavy.col, strongNavy.row);
        var adj = false;
        for (var ni = 0; ni < nb.length; ni++) {
          if (nb[ni][0] === th.col && nb[ni][1] === th.row) { adj = true; break; }
        }
        if (!adj) navyTargets.push(th);
      }
      // Also include player-owned hexes
      for (var key in G.hexes) {
        var th = G.hexes[key];
        if (th.owner !== 'player') continue;
        var nb = getNeighbors(strongNavy.col, strongNavy.row);
        var adj = false;
        for (var ni = 0; ni < nb.length; ni++) {
          if (nb[ni][0] === th.col && nb[ni][1] === th.row) { adj = true; break; }
        }
        if (!adj) navyTargets.push(th);
      }
      if (navyTargets.length > 0) {
        navyTargets.sort(function(a, b) { return a.troops - b.troops; });
        var navySend = Math.floor(strongNavy.troops * 0.5);
        if (navySend > 0) doCombat(strongNavy, navyTargets[0], navySend, ai.id, 0.5);
      }
    }
  }
}

// ===== RENDERING =====
function render() {
  var w = canvas.width, h = canvas.height;
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);
  if (!G) return;

  ctx.save();
  ctx.translate(camX, camY);
  ctx.scale(zoom, zoom);

  // Calculate visible range
  var invZoom = 1 / zoom;
  var left = -camX * invZoom - HEX_SIZE * 2;
  var top_ = -camY * invZoom - HEX_SIZE * 2;
  var right = (w - camX) * invZoom + HEX_SIZE * 2;
  var bottom = (h - camY) * invZoom + HEX_SIZE * 2;

  var minR = Math.max(0, Math.floor(top_ / (HEX_SIZE * 1.5)) - 1);
  var maxR = Math.min(MAP_DATA.length - 1, Math.ceil(bottom / (HEX_SIZE * 1.5)) + 1);
  var minC = Math.max(0, Math.floor(left / (Math.sqrt(3) * HEX_SIZE)) - 2);
  var maxC = MAP_COLS - 1;

  // Draw hexes
  for (var r = minR; r <= maxR; r++) {
    var row = MAP_DATA[r];
    if (!row) continue;
    var rc = Math.min(row.length - 1, maxC);
    for (var c = minC; c <= rc; c++) {
      var ch = row[c];
      if (ch === '.') continue;
      var key = hexKey(c, r);
      var hex = G.hexes[key];
      if (!hex) continue;
      var pos = hexToPixel(c, r);

      // Draw filled hex
      var color = getOwnerColor(hex.owner);
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.75;
      ctx.beginPath();
      for (var i = 0; i < 6; i++) {
        var angle = Math.PI / 3 * i - Math.PI / 6;
        var hx = pos.x + HEX_SIZE * Math.cos(angle);
        var hy = pos.y + HEX_SIZE * Math.sin(angle);
        if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1.0;

      // Draw outline
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Troops text
      // Troop count on hexes - disabled (too cluttered)
      // if (hex.troops > 0 && zoom >= 0.5) {
      //   ctx.fillStyle = '#fff';
      //   ctx.font = 'bold ' + Math.max(5, Math.min(9, 8 * zoom)) + 'px sans-serif';
      //   ctx.textAlign = 'center';
      //   ctx.textBaseline = 'middle';
      //   var display = formatNum(hex.troops);
      //   var textY = pos.y;
      //   if (hex.factories > 0 || hex.forts > 0) textY -= 2;
      //   ctx.fillText(display, pos.x, textY);
      // }

      // Icons
      if (zoom >= 0.7) {
        ctx.font = Math.max(5, 7 * zoom) + 'px sans-serif';
        ctx.textAlign = 'center';
        var iconY = pos.y + 5;
        if (hex.factories > 0) {
          ctx.fillText('\u{1F3ED}', pos.x, iconY);
        }
        if (hex.forts > 0) {
          ctx.fillText('\u{1F6E1}', pos.x + (hex.factories > 0 ? 8 : 0), iconY);
        }
      }
    }
  }

  // Draw borders between different owners
  ctx.lineWidth = Math.max(1.5, 2 * zoom);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  for (var r = minR; r <= maxR; r++) {
    var row = MAP_DATA[r];
    if (!row) continue;
    var rc = Math.min(row.length - 1, maxC);
    for (var c = minC; c <= rc; c++) {
      var ch = row[c];
      if (ch === '.') continue;
      var key = hexKey(c, r);
      var hex = G.hexes[key];
      if (!hex) continue;
      var pos = hexToPixel(c, r);
      var nb = getNeighbors(c, r);
      for (var ni = 0; ni < nb.length; ni++) {
        var nc = nb[ni][0], nr = nb[ni][1];
        var nk = hexKey(nc, nr);
        var nh = G.hexes[nk];
        if (!nh || nh.owner !== hex.owner) {
          // Draw border edge
          var midX = (pos.x + hexToPixel(nc, nr).x) / 2;
          var midY = (pos.y + hexToPixel(nc, nr).y) / 2;
          // Approximate edge as line from hex center towards neighbor center
          var dx = midX - pos.x;
          var dy = midY - pos.y;
          var len = Math.sqrt(dx * dx + dy * dy);
          if (len > 0) {
            // Offset to hex edge
            var edgeX = pos.x + dx * 0.9;
            var edgeY = pos.y + dy * 0.9;
            ctx.beginPath();
            ctx.moveTo(edgeX - dy / len * HEX_SIZE * 0.5, edgeY + dx / len * HEX_SIZE * 0.5);
            ctx.lineTo(edgeX + dy / len * HEX_SIZE * 0.5, edgeY - dx / len * HEX_SIZE * 0.5);
            ctx.stroke();
          }
        }
      }
    }
  }

  // Country name labels (draw at center of each country)
  if (G && G.countryHexes && zoom > 0.3) {
    var drawnLabels = {};
    for (var code in G.countryHexes) {
      var hexList = G.countryHexes[code];
      if (!hexList || hexList.length === 0) continue;
      var cx = 0, cy = 0, count = 0;
      for (var li = 0; li < hexList.length; li++) {
        var lh = G.hexes[hexList[li]];
        if (!lh) continue;
        var lp = hexToPixel(lh.col, lh.row);
        cx += lp.x; cy += lp.y; count++;
      }
      if (count === 0) continue;
      cx /= count; cy /= count;
      var def = COUNTRY_DEFS[code];
      var label = def ? (lang === 'cn' ? def.zh : def.en) : code;
      var fontSize = Math.max(8, Math.min(14, Math.sqrt(count) * 2.5));
      ctx.font = 'bold ' + fontSize + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.strokeStyle = 'rgba(0,0,0,0.6)';
      ctx.lineWidth = 3;
      ctx.strokeText(label, cx, cy);
      ctx.fillText(label, cx, cy);
    }
  }

  // Hover highlight
  if (hoveredHex) {
    var hp = hexToPixel(hoveredHex.col, hoveredHex.row);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var angle = Math.PI / 3 * i - Math.PI / 6;
      var hx = hp.x + (HEX_SIZE + 1) * Math.cos(angle);
      var hy = hp.y + (HEX_SIZE + 1) * Math.sin(angle);
      if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // Selected country highlight (all hexes of the country)
  if (selectedHex && selectedCountry) {
    var scList = G.countryHexes[selectedCountry];
    if (scList) {
      ctx.strokeStyle = '#ffd200';
      ctx.lineWidth = 2.5;
      for (var si = 0; si < scList.length; si++) {
        var sh = G.hexes[scList[si]];
        if (!sh) continue;
        var sp = hexToPixel(sh.col, sh.row);
        ctx.beginPath();
        for (var i = 0; i < 6; i++) {
          var angle = Math.PI / 3 * i - Math.PI / 6;
          var hx = sp.x + (HEX_SIZE + 1) * Math.cos(angle);
          var hy = sp.y + (HEX_SIZE + 1) * Math.sin(angle);
          if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
  }

  ctx.restore();
}

// ===== UI UPDATES =====
function updateTopBar() {
  if (!G) return;
  document.getElementById('goldDisplay').textContent = Math.floor(G.playerGold);
  document.getElementById('goldRate').textContent = G._pIncome ? G._pIncome.toFixed(0) : '0';
  document.getElementById('troopDisplay').textContent = formatNum(G._pTroops);
  document.getElementById('hexDisplay').textContent = (G._pHexes || 0) + '/' + G.totalLand;

  var mins = Math.floor(gameTime / 60);
  var secs = Math.floor(gameTime % 60);
  document.getElementById('timeDisplay').textContent =
    (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;

  var pct = Math.floor((G._pHexes || 0) / G.totalLand * 100);
  document.getElementById('victoryFill').style.width = pct + '%';
  document.getElementById('victoryPct').textContent = pct + '%';
  document.getElementById('victoryLabel').textContent = t('victoryProgress');

  updateTooltip();
}

function updateTooltip() {
  var tip = document.getElementById('tooltip');
  if (!hoveredHex || !G) { tip.style.display = 'none'; return; }
  var key = hexKey(hoveredHex.col, hoveredHex.row);
  var hex = G.hexes[key];
  if (!hex) { tip.style.display = 'none'; return; }

  var def = COUNTRY_DEFS[hex.origOwner];
  var countryName = def ? (lang === 'cn' ? def.zh : def.en) : '?';
  var ownerName = getOwnerName(hex.owner);
  var stars = '';
  for (var i = 0; i < hex.quality; i++) stars += '\u2B50';

  tip.style.display = 'block';
  tip.style.left = (lastMouseX + 14) + 'px';
  tip.style.top = (lastMouseY + 14) + 'px';
  tip.innerHTML = '<b>' + countryName + '</b> | ' + ownerName +
    '<br>Troops: ' + formatNum(hex.troops) + ' | Q:' + stars +
    ' | \u{1F3ED}' + hex.factories + ' | \u{1F6E1}' + hex.forts;
}

function updateSidebar() {
  var content = document.getElementById('sideContent');
  document.getElementById('sideTitle').textContent = t('selected');

  if (!selectedHex || !G) {
    content.innerHTML = '<p style="color:#aaa;font-size:.85em">' + t('yourTurn') + '</p>';
    return;
  }

  var key = hexKey(selectedHex.col, selectedHex.row);
  var hex = G.hexes[key];
  if (!hex) { content.innerHTML = ''; return; }

  var isOwned = (hex.owner === 'player');
  var def = COUNTRY_DEFS[hex.origOwner];
  var countryName = def ? (lang === 'cn' ? def.zh : def.en) : '?';
  var ownerName = getOwnerName(hex.owner);
  var stars = '';
  for (var i = 0; i < hex.quality; i++) stars += '\u2B50';

  var html = '<div class="info-row"><span>' + t('country') + '</span><span>' + countryName + '</span></div>' +
    '<div class="info-row"><span>' + t('owner') + '</span><span style="color:' + getOwnerColor(hex.owner) + '">' + ownerName + '</span></div>' +
    '<div class="info-row"><span>' + t('quality') + '</span><span>' + stars + '</span></div>' +
    '<div class="info-row"><span>' + t('troopCount') + '</span><span>' + formatNum(hex.troops) + '</span></div>' +
    '<div class="info-row"><span>' + t('factories') + '</span><span>' + hex.factories + '/3</span></div>' +
    '<div class="info-row"><span>' + t('forts') + '</span><span>' + hex.forts + '/5</span></div>' +
    '<hr style="border-color:#333;margin:8px 0">';

  if (mode === 'idle' && isOwned) {
    html += '<button class="action-btn btn-recruit" onclick="doRecruit()">' + t('recruit') +
      '<br><small>' + t('recruitCost') + '</small></button>';
    html += '<button class="action-btn btn-factory"' + (hex.factories >= 3 ? ' disabled' : '') +
      ' onclick="doBuildFactory()">' + t('buildFactory') +
      '<br><small>' + t('factoryCost') + '</small></button>';
    html += '<button class="action-btn btn-fort"' + (hex.forts >= 5 ? ' disabled' : '') +
      ' onclick="doBuildFort()">' + t('buildFort') +
      '<br><small>' + t('fortCost') + '</small></button>';
    html += '<button class="action-btn btn-move"' + (hex.troops <= 0 ? ' disabled' : '') +
      ' onclick="startMove()">' + t('move') + '</button>';

    var hasEnemy = false;
    var nb = getNeighbors(hex.col, hex.row);
    for (var i = 0; i < nb.length; i++) {
      var nk = hexKey(nb[i][0], nb[i][1]);
      if (G.hexes[nk] && G.hexes[nk].owner !== 'player') { hasEnemy = true; break; }
    }
    html += '<button class="action-btn btn-attack"' + (!hasEnemy || hex.troops <= 0 ? ' disabled' : '') +
      ' onclick="startAttack()">' + t('attack') + '</button>';
    html += '<button class="action-btn btn-navy"' + (hex.troops <= 0 ? ' disabled' : '') +
      ' onclick="startNavy()">' + t('navy') +
      '<br><small>' + t('navyCost') + '</small></button>';
  } else if (mode === 'move') {
    html += '<p style="color:#ffd200;font-size:.9em">' + t('moveSelect') + '</p>';
    var half = Math.floor(hex.troops / 2);
    html += '<div class="slider-row"><span>' + t('amount') + '</span>' +
      '<input type="range" id="troopSlider" min="0" max="' + hex.troops + '" value="' + half +
      '" oninput="document.getElementById(\'troopVal\').textContent=formatNum(this.value)">' +
      '<span id="troopVal" class="val">' + formatNum(half) + '</span></div>';
    html += '<button class="action-btn btn-cancel" onclick="cancelAction()">' + t('cancel') + '</button>';
  } else if (mode === 'attack') {
    html += '<p style="color:#ff6b6b;font-size:.9em">' + t('attackSelect') + '</p>';
    var send = Math.floor(hex.troops * 0.7);
    html += '<div class="slider-row"><span>' + t('amount') + '</span>' +
      '<input type="range" id="troopSlider" min="1" max="' + hex.troops + '" value="' + send +
      '" oninput="document.getElementById(\'troopVal\').textContent=formatNum(this.value)">' +
      '<span id="troopVal" class="val">' + formatNum(send) + '</span></div>';
    html += '<button class="action-btn btn-cancel" onclick="cancelAction()">' + t('cancel') + '</button>';
  } else if (mode === 'navy') {
    html += '<p style="color:#4FC3F7;font-size:.9em">' + t('navySelect') + '</p>';
    html += '<p style="color:#FFC107;font-size:.8em">' + t('navyCost') + '</p>';
    var send = Math.floor(hex.troops * 0.7);
    html += '<div class="slider-row"><span>' + t('amount') + '</span>' +
      '<input type="range" id="troopSlider" min="1" max="' + hex.troops + '" value="' + send +
      '" oninput="document.getElementById(\'troopVal\').textContent=formatNum(this.value)">' +
      '<span id="troopVal" class="val">' + formatNum(send) + '</span></div>';
    html += '<button class="action-btn btn-cancel" onclick="cancelAction()">' + t('cancel') + '</button>';
  }

  content.innerHTML = html;
}

// ===== PLAYER ACTIONS =====
function doRecruit() {
  if (!selectedHex || !G) return;
  var hex = G.hexes[hexKey(selectedHex.col, selectedHex.row)];
  if (!hex || hex.owner !== 'player') return;
  var amount = Math.floor(G.playerGold);
  if (amount <= 0) { notify(t('notEnoughGold'), 'lose'); return; }
  hex.troops += amount * 100;
  G.playerGold -= amount;
  updateSidebar();
}

function doBuildFactory() {
  if (!selectedHex || !G) return;
  var hex = G.hexes[hexKey(selectedHex.col, selectedHex.row)];
  if (!hex || hex.owner !== 'player') return;
  if (hex.factories >= 3) { notify(t('maxFact'), 'lose'); return; }
  if (G.playerGold < 500) { notify(t('notEnoughGold'), 'lose'); return; }
  hex.factories++;
  G.playerGold -= 500;
  updateSidebar();
}

function doBuildFort() {
  if (!selectedHex || !G) return;
  var hex = G.hexes[hexKey(selectedHex.col, selectedHex.row)];
  if (!hex || hex.owner !== 'player') return;
  if (hex.forts >= 5) { notify(t('maxForts'), 'lose'); return; }
  if (G.playerGold < 300) { notify(t('notEnoughGold'), 'lose'); return; }
  hex.forts++;
  G.playerGold -= 300;
  updateSidebar();
}

function startMove() {
  mode = 'move';
  updateSidebar();
}

function startAttack() {
  mode = 'attack';
  updateSidebar();
}

function startNavy() {
  mode = 'navy';
  updateSidebar();
}

function cancelAction() {
  mode = 'idle';
  updateSidebar();
}

// ===== NOTIFICATIONS =====
function notify(msg, type) {
  var div = document.getElementById('notifications');
  var el = document.createElement('div');
  el.className = 'notif ' + (type || 'info');
  el.textContent = msg;
  div.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 4000);
  while (div.children.length > 5) div.removeChild(div.firstChild);
}

// ===== VICTORY =====
function checkVictory() {
  if (!G) return;
  var pHexes = G._pHexes || 0;
  if (pHexes >= G.totalLand * 0.5) { showEndScreen(true); return; }
  var allDead = true;
  for (var i = 0; i < G.aiPlayers.length; i++) {
    if (!G.eliminated[G.aiPlayers[i].id]) { allDead = false; break; }
  }
  if (allDead && G.aiPlayers.length > 0) { showEndScreen(true); return; }
  if (pHexes === 0 && gameTime > 5) { showEndScreen(false); }
}

function showEndScreen(win) {
  gameStarted = false;
  document.getElementById('victoryOverlay').style.display = 'flex';
  document.getElementById('victoryText').textContent = win ? t('victory') : t('defeat');
  document.getElementById('playAgainBtn').textContent = t('playAgain');
  try { localStorage.removeItem('hexwar_save'); } catch(e) {}
}

// ===== SAVE / LOAD =====
function saveGame() {
  if (!G) return;
  var hexSave = {};
  for (var key in G.hexes) {
    var h = G.hexes[key];
    hexSave[key] = { o: h.owner, t: h.troops, f: h.factories, ft: h.forts };
  }
  var data = {
    lang: lang, diff: diff, playerCountry: playerCountry,
    gameTime: gameTime, camX: camX, camY: camY, zoom: zoom,
    playerGold: G.playerGold,
    hexes: hexSave,
    aiPlayers: G.aiPlayers.map(function(a) {
      return { id: a.id, countries: a.countries, gold: a.gold, name: a.name, color: a.color };
    }),
    eliminated: G.eliminated
  };
  try { localStorage.setItem('hexwar_save', JSON.stringify(data)); } catch(e) {}
}

function loadGame() {
  var raw = null;
  try { raw = localStorage.getItem('hexwar_save'); } catch(e) {}
  if (!raw) return;
  var data = JSON.parse(raw);
  lang = data.lang || 'en';
  diff = data.diff || 'normal';
  playerCountry = data.playerCountry;

  var info = initMapData();
  var hexes = info.hexes;

  for (var key in data.hexes) {
    var saved = data.hexes[key];
    if (hexes[key]) {
      hexes[key].owner = saved.o;
      hexes[key].troops = saved.t;
      hexes[key].factories = saved.f;
      hexes[key].forts = saved.ft;
    }
  }

  var aiPlayers = data.aiPlayers.map(function(a) {
    return { id: a.id, countries: a.countries, gold: a.gold, name: a.name, color: a.color,
      _income: 0, _troops: 0, _hexes: 0 };
  });

  G = {
    hexes: hexes,
    countryHexes: info.countryHexes,
    totalLand: info.totalLand,
    playerCountry: playerCountry,
    playerGold: data.playerGold,
    aiPlayers: aiPlayers,
    gameTime: data.gameTime || 0,
    eliminated: data.eliminated || {},
    _pIncome: 0, _pTroops: 0, _pHexes: 0
  };

  camX = data.camX || 0;
  camY = data.camY || 0;
  zoom = data.zoom || 1;
  gameTime = data.gameTime || 0;

  document.getElementById('titleScreen').style.display = 'none';
  showGameUI();
  gameStarted = true;
  lastFrameTime = 0;
  requestAnimationFrame(gameLoop);
}

// ===== INPUT =====
function setupInput() {
  canvas.addEventListener('mousedown', function(e) {
    if (e.button === 0) {
      dragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      camStartX = camX;
      camStartY = camY;
    }
  });

  canvas.addEventListener('mousemove', function(e) {
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    if (dragging) {
      camX = camStartX + (e.clientX - dragStartX);
      camY = camStartY + (e.clientY - dragStartY);
      return;
    }
    var rect = canvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left - camX) / zoom;
    var my = (e.clientY - rect.top - camY) / zoom;
    var hex = pixelToHex(mx, my);
    if (hex.col >= 0 && hex.col < MAP_COLS && hex.row >= 0 && hex.row < MAP_DATA.length) {
      var ch = (MAP_DATA[hex.row] || '')[hex.col];
      hoveredHex = (ch !== '.') ? { col: hex.col, row: hex.row } : null;
    } else {
      hoveredHex = null;
    }
  });

  canvas.addEventListener('mouseup', function(e) {
    var moved = Math.abs(e.clientX - dragStartX) + Math.abs(e.clientY - dragStartY);
    dragging = false;
    if (moved < 6) handleClick(e.clientX, e.clientY);
  });

  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    var oldZoom = zoom;
    zoom *= e.deltaY > 0 ? 0.9 : 1.1;
    zoom = Math.max(0.3, Math.min(5, zoom));
    camX = mx - (mx - camX) * zoom / oldZoom;
    camY = my - (my - camY) * zoom / oldZoom;
  }, { passive: false });

  // Touch support
  var touchStartDist = 0;
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
      dragging = true;
      dragStartX = e.touches[0].clientX;
      dragStartY = e.touches[0].clientY;
      camStartX = camX;
      camStartY = camY;
    } else if (e.touches.length === 2) {
      dragging = false;
      touchStartDist = Math.hypot(
        e.touches[1].clientX - e.touches[0].clientX,
        e.touches[1].clientY - e.touches[0].clientY
      );
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (e.touches.length === 1 && dragging) {
      camX = camStartX + (e.touches[0].clientX - dragStartX);
      camY = camStartY + (e.touches[0].clientY - dragStartY);
    } else if (e.touches.length === 2 && touchStartDist > 0) {
      var d = Math.hypot(
        e.touches[1].clientX - e.touches[0].clientX,
        e.touches[1].clientY - e.touches[0].clientY
      );
      var scale = d / touchStartDist;
      var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      var oldZoom = zoom;
      zoom = Math.max(0.3, Math.min(5, zoom * scale));
      camX = cx - (cx - camX) * zoom / oldZoom;
      camY = cy - (cy - camY) * zoom / oldZoom;
      touchStartDist = d;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    if (e.touches.length === 0 && dragging) {
      var moved = Math.abs(dragStartX - (camX - camStartX + dragStartX)) +
                  Math.abs(dragStartY - (camY - camStartY + dragStartY));
      // Simpler check: compare cam movement
      if (Math.abs(camX - camStartX) + Math.abs(camY - camStartY) < 10) {
        handleClick(dragStartX, dragStartY);
      }
    }
    dragging = false;
  });
}

function handleClick(cx, cy) {
  if (!G || !gameStarted) return;
  var rect = canvas.getBoundingClientRect();
  var mx = (cx - rect.left - camX) / zoom;
  var my = (cy - rect.top - camY) / zoom;
  var hex = pixelToHex(mx, my);

  var key = hexKey(hex.col, hex.row);
  var target = G.hexes[key];
  if (!target) { mode = 'idle'; selectedHex = null; updateSidebar(); return; }

  if (mode === 'move') {
    if (target.owner === 'player' && selectedHex) {
      var slider = document.getElementById('troopSlider');
      var amount = slider ? parseInt(slider.value) : 0;
      var srcHex = G.hexes[hexKey(selectedHex.col, selectedHex.row)];
      if (srcHex && amount > 0 && srcHex.troops >= amount) {
        srcHex.troops -= amount;
        target.troops += amount;
        notify('Moved ' + formatNum(amount) + ' troops', 'info');
      }
      mode = 'idle';
      selectedHex = { col: hex.col, row: hex.row };
      updateSidebar();
      return;
    }
    mode = 'idle';
  }

  if (mode === 'attack') {
    if (selectedHex && target.owner !== 'player') {
      var nb = getNeighbors(selectedHex.col, selectedHex.row);
      var isAdj = false;
      for (var i = 0; i < nb.length; i++) {
        if (nb[i][0] === hex.col && nb[i][1] === hex.row) { isAdj = true; break; }
      }
      if (isAdj) {
        var slider = document.getElementById('troopSlider');
        var amount = slider ? parseInt(slider.value) : 0;
        var srcHex = G.hexes[hexKey(selectedHex.col, selectedHex.row)];
        if (srcHex && amount > 0 && amount <= srcHex.troops) {
          doCombat(srcHex, target, amount, 'player');
          mode = 'idle';
          selectedHex = { col: hex.col, row: hex.row };
          updateSidebar();
          return;
        }
      }
    }
    mode = 'idle';
  }

  if (mode === 'navy') {
    if (selectedHex && target.owner !== 'player') {
      // Navy can attack ANY non-owned hex (not just adjacent)
      var slider = document.getElementById('troopSlider');
      var amount = slider ? parseInt(slider.value) : 0;
      var srcHex = G.hexes[hexKey(selectedHex.col, selectedHex.row)];
      if (srcHex && amount > 0 && amount <= srcHex.troops) {
        doCombat(srcHex, target, amount, 'player', 0.5);
        mode = 'idle';
        selectedHex = { col: hex.col, row: hex.row };
        updateSidebar();
        return;
      }
    }
    mode = 'idle';
  }

  // Select entire country
  var countryCode = target.origOwner;
  selectedHex = { col: hex.col, row: hex.row };
  selectedCountry = countryCode; // highlight all hexes of this country
  updateSidebar();
}

// ===== RESIZE =====
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

// ===== BOOT =====
window.onload = function() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  setupInput();

  // Check for existing save
  try {
    if (localStorage.getItem('hexwar_save')) {
      document.getElementById('continueBtn').style.display = 'block';
    }
  } catch(e) {}
};
